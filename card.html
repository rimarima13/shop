<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDviyxxPk0ImXKBqClAwijH4jb_gYGR3rI",
        authDomain: "ozo1111.firebaseapp.com",
        databaseURL: "https://ozo1111-default-rtdb.firebaseio.com",
        projectId: "ozo1111",
        storageBucket: "ozo1111.firebasestorage.app",
        messagingSenderId: "227549240271",
        appId: "1:227549240271:web:6c10dd8a11dac858b190ba"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    (function() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const isReset = urlParams.get('action') === 'reset';

            // 【超安全対策】新旧すべてのローカルストレージデータを一回きれいに取得する
            let oldWeight = localStorage.getItem('v_count');
            let newWeight = localStorage.getItem('v_total_count');
            
            let totalCount = 0;

            // もしスマホ内に古いデータ（v_count）だけが残っていたら自動で引き継いで消去
            if (oldWeight && !newWeight) {
                totalCount = parseInt(oldWeight) || 0;
                localStorage.removeItem('v_count'); // 古いゴミデータは消す
            } else {
                totalCount = parseInt(newWeight) || 0;
            }

            if (isReset) {
                // 強制リセット処理（すべての保存データを全消去）
                localStorage.removeItem('v_count');
                localStorage.removeItem('v_total_count');
                
                database.ref('latest_scan').set({
                    totalCount: 0,
                    lap: 1,
                    currentCount: 0,
                    timestamp: Date.now()
                }).then(() => { window.close(); });
                return;
            }

            // カウントアップ
            totalCount++;
            localStorage.setItem('v_total_count', totalCount);

            // 10回ごとの周回・現在の回数を精密計算
            let lap = Math.floor((totalCount - 1) / 10) + 1;
            let currentCount = (totalCount - 1) % 10 + 1;

            // Firebaseへ送信
            database.ref('latest_scan').set({
                totalCount: totalCount,
                lap: lap,
                currentCount: currentCount,
                timestamp: Date.now()
            }).then(() => {
                window.close();
            });

        } catch (e) {
            // 万が一エラーが出てもFirebaseに最低限のデータを送ってundefinedを防ぐ
            database.ref('latest_scan').set({
                totalCount: 1,
                lap: 1,
                currentCount: 1,
                timestamp: Date.now()
            }).then(() => { window.close(); });
        }
    })();
</script>
</body>
</html>
