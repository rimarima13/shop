<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDviyxxPk0ImXKBqClAwijH4jb_gYGR3rI",
        authDomain: "ozo1111.firebaseapp.com",
        databaseURL: "https://ozo1111-default-rtdb.firebaseio.com",
        projectId: "ozo1111",
        storageBucket: "ozo1111.firebasestorage.app",
        messagingSenderId: "227549240271",
        appId: "1:227549240271:web:6c10dd8a11dac858b190ba"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    (function() {
        try {
            // URLに ?action=reset が付いているかチェック
            const urlParams = new URLSearchParams(window.location.search);
            const isReset = urlParams.get('action') === 'reset';

            let count = 0;

            if (isReset) {
                // 【リセット処理】スマホのデータを消して0（次回1回目になる状態）にする
                localStorage.removeItem('v_count');
                count = 0; 
            } else {
                // 【通常処理】カウントアップ
                count = parseInt(localStorage.getItem('v_count')) || 0;
                count++;
                localStorage.setItem('v_count', count);
            }

            // Firebaseへ報告
            database.ref('latest_scan').set({
                count: count,
                timestamp: Date.now()
            }).then(() => {
                window.close();
            });

        } catch (e) { }
    })();
</script>
</body>
</html>
