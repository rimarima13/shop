<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗用一括モニター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; 
            transition: background-color 0.4s, color 0.4s;
            background-color: #f8f9fa; /* 最初の画面は薄いグレー */
            color: #212529;
        }
        .box {
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            min-width: 340px;
            box-sizing: border-box;
        }
        #welcome-message {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 0 30px 0;
        }
        #count-area {
            display: none; 
        }
        h1 { 
            font-size: 5rem; 
            margin: 0 0 10px 0; 
            font-weight: bold; 
        }
        .sub-text { 
            font-size: 1.6rem; 
            margin: 0 0 30px 0; 
            font-weight: bold; 
        }
        #qrcode-area {
            display: block;
        }
        #qrcode { 
            margin: 0 auto; 
            padding: 15px; 
            background: #fff; 
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* ボタン全体のスタイル */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 25px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, opacity 0.2s;
            width: 80%;
        }
        button:active {
            transform: scale(0.95);
        }
        /* 次に進むボタン（黒） */
        #reset-btn {
            display: none;
            background-color: #212529;
            color: #fff;
        }
        /* 回数リセットボタン（赤） */
        #clear-btn {
            display: none;
            background-color: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="box">
    <div id="welcome-message">QRコードを<br>スキャンしてください</div>

    <div id="count-area">
        <h1 id="count-display">1回目</h1>
        <p class="sub-text">のご来店</p>
    </div>

    <div id="qrcode-area">
        <div id="qrcode"></div>
    </div>

    <div class="btn-group">
        <button id="reset-btn" onclick="resetToHome()">次の案内へ進む</button>
        <button id="clear-btn" onclick="triggerResetMode()">この人の回数をリセット</button>
    </div>
</div>

<script>
    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyDviyxxPk0ImXKBqClAwijH4jb_gYGR3rI",
        authDomain: "ozo1111.firebaseapp.com",
        databaseURL: "https://ozo1111-default-rtdb.firebaseio.com", 
        projectId: "ozo1111",
        storageBucket: "ozo1111.firebasestorage.app",
        messagingSenderId: "227549240271",
        appId: "1:227549240271:web:6c10dd8a11dac858b190ba"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // URLの解析とQRコード生成の準備
    const currentUrl = window.location.href;
    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
    const normalUrl = baseUrl + '/card.html';
    const resetUrl = baseUrl + '/card.html?action=reset'; // リセット用URL

    // 最初は通常QRを生成
    const qrcodeContainer = document.getElementById("qrcode");
    let qrGenerator = new QRCode(qrcodeContainer, { text: normalUrl, width: 220, height: 220 });

    const STAGE_COLORS = [
        { bg: "#D1E7DD", text: "#0f5132" }, // 1回目
        { bg: "#CFF4FC", text: "#055160" }, // 2回目
        { bg: "#FFF3CD", text: "#664d03" }, // 3回目
        { bg: "#F8D7DA", text: "#842029" }, // 4回目
        { bg: "#E2D9F3", text: "#563d7c" }  // 5回目
    ];

    // Firebaseのデータ監視
    database.ref('latest_scan').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.timestamp > (Date.now() - 5000)) { 
            if (data.count === 0) {
                // お客さん側がリセット処理を通過したら、お店の画面を自動で1回目の表示にする
                showCountScreen(1);
            } else {
                showCountScreen(data.count);
            }
        }
    });

    // スキャンされた時の画面切り替え
    function showCountScreen(count) {
        document.getElementById('welcome-message').style.display = 'none';
        document.getElementById('qrcode-area').style.display = 'none';

        document.getElementById('count-area').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('clear-btn').style.display = 'inline-block';

        document.getElementById('count-display').innerText = count + "回目";

        let colorIndex = (count - 1) % STAGE_COLORS.length;
        document.body.style.backgroundColor = STAGE_COLORS[colorIndex].bg;
        document.body.style.color = STAGE_COLORS[colorIndex].text;
    }

    // 次の案内へ進む（通常の初期化）
    function resetToHome() {
        // QRコードを通常URLに戻す
        qrGenerator.clear();
        qrGenerator.makeCode(normalUrl);

        document.getElementById('welcome-message').innerText = "QRコードを\nスキャンしてください";
        document.getElementById('welcome-message').style.display = 'block';
        document.getElementById('qrcode-area').style.display = 'block';
        document.getElementById('count-area').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('clear-btn').style.display = 'none';

        document.body.style.backgroundColor = '#f8f9fa';
        document.body.style.color = '#212529';
    }

    // 「回数をリセット」を押した時の処理
    function triggerResetMode() {
        // QRコードの中身を「リセット用URL」に書き換えて再表示する
        qrGenerator.clear();
        qrGenerator.makeCode(resetUrl);

        // 画面を「リセット用スキャン待ち」の見た目に変える
        document.getElementById('welcome-message').innerText = "【リセット用】\nもう一度スキャンさせてください";
        document.getElementById('welcome-message').style.display = 'block';
        document.getElementById('qrcode-area').style.display = 'block';
        
        document.getElementById('count-area').style.display = 'none';
        document.getElementById('clear-btn').style.display = 'none';
        // 「戻る」ための中央ボタンだけ残す
        document.getElementById('reset-btn').innerText = "キャンセルして戻る";
        document.getElementById('reset-btn').style.display = 'inline-block';

        document.body.style.backgroundColor = '#fff3cd'; // 警告っぽい黄色
        document.body.style.color = '#664d03';
    }
</script>
</body>
</html>
