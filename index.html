<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗用一括モニター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; 
            transition: background-color 0.4s, color 0.4s;
            background-color: #f8f9fa; /* 最初の画面は落ち着いた薄いグレー */
            color: #212529;
        }
        .box {
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            min-width: 320px;
            box-sizing: border-box;
        }
        /* 受付中メッセージ */
        #welcome-message {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 0 30px 0;
        }
        /* 回数表示（最初は非表示） */
        #count-area {
            display: none; /* 最初は隠す */
        }
        h1 { 
            font-size: 5rem; 
            margin: 0 0 10px 0; 
            font-weight: bold; 
        }
        .sub-text { 
            font-size: 1.6rem; 
            margin: 0 0 30px 0; 
            font-weight: bold; 
        }
        /* QRコードを表示するエリア */
        #qrcode-area {
            display: block;
        }
        #qrcode { 
            margin: 0 auto; 
            padding: 15px; 
            background: #fff; 
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* 最初に戻るボタン */
        #reset-btn {
            display: none; /* 最初は隠す */
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #212529;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        #reset-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="box">
    <div id="welcome-message">QRコードを<br>スキャンしてください</div>

    <div id="count-area">
        <h1 id="count-display">1回目</h1>
        <p class="sub-text">のご来店</p>
    </div>

    <div id="qrcode-area">
        <div id="qrcode"></div>
    </div>

    <button id="reset-btn" onclick="resetToHome()">次の案内へ進む</button>
</div>

<script>
    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyDviyxxPk0ImXKBqClAwijH4jb_gYGR3rI",
        authDomain: "ozo1111.firebaseapp.com",
        databaseURL: "https://ozo1111-default-rtdb.firebaseio.com", 
        projectId: "ozo1111",
        storageBucket: "ozo1111.firebasestorage.app",
        messagingSenderId: "227549240271",
        appId: "1:227549240271:web:6c10dd8a11dac858b190ba"
    };

    // Firebaseの初期化
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // QRコードの自動生成
    const currentUrl = window.location.href;
    const targetUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/')) + '/card.html';
    new QRCode(document.getElementById("qrcode"), { text: targetUrl, width: 220, height: 220 });

    // 来店回数ごとの背景色・文字色
    const STAGE_COLORS = [
        { bg: "#D1E7DD", text: "#0f5132" }, // 1回目：緑
        { bg: "#CFF4FC", text: "#055160" }, // 2回目：青
        { bg: "#FFF3CD", text: "#664d03" }, // 3回目：黄
        { bg: "#F8D7DA", text: "#842029" }, // 4回目：赤
        { bg: "#E2D9F3", text: "#563d7c" }  // 5回目：紫
    ];

    // Firebaseのデータ監視
    database.ref('latest_scan').on('value', (snapshot) => {
        const data = snapshot.val();
        // 5秒以内に送信された新しいデータがあれば画面を切り替える
        if (data && data.timestamp > (Date.now() - 5000)) { 
            showCountScreen(data.count);
        }
    });

    // お客さんがスキャンした時の画面切り替え処理
    function showCountScreen(count) {
        // 1. 最初の画面の要素を隠す
        document.getElementById('welcome-message').style.display = 'none';
        document.getElementById('qrcode-area').style.display = 'none';

        // 2. 回数とボタンを表示する
        document.getElementById('count-area').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'inline-block';

        // 3. 回数の数字を書き換え
        document.getElementById('count-display').innerText = count + "回目";

        // 4. 回数に合わせて背景色と文字色を切り替える
        let colorIndex = (count - 1) % STAGE_COLORS.length;
        document.body.style.backgroundColor = STAGE_COLORS[colorIndex].bg;
        document.body.style.color = STAGE_COLORS[colorIndex].text;
    }

    // 「次の案内へ進む」ボタンを押した時の処理（最初の画面に戻す）
    function resetToHome() {
        // 1. 表示・非表示を初期状態に戻す
        document.getElementById('welcome-message').style.display = 'block';
        document.getElementById('qrcode-area').style.display = 'block';
        document.getElementById('count-area').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';

        // 2. 背景色と文字色を初期のグレーに戻す
        document.body.style.backgroundColor = '#f8f9fa';
        document.body.style.color = '#212529';
    }
</script>
</body>
</html>
