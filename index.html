<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗用一括モニター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; 
            transition: background-color 0.4s, color 0.4s;
            background-color: #f8f9fa; 
            color: #212529;
            position: relative;
        }

        /* 2周目以降用の水玉模様 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(0, 0, 0, 0.08) 20%, transparent 20%);
            background-size: 30px 30px; 
            opacity: 0; 
            transition: opacity 0.4s;
            z-index: -1;
        }
        body.dot-pattern::before {
            opacity: 1;
        }

        /* 【新設】画面右上のシステム再起動ボタン */
        #system-reload-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 15px;
            font-size: 0.9rem;
            background-color: #6c757d;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: auto; /* グループボタンと連動させない */
        }
        #system-reload-btn:hover {
            opacity: 1;
        }

        .box {
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            min-width: 340px;
            box-sizing: border-box;
            z-index: 1;
        }
        #welcome-message {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 0 30px 0;
            white-space: pre-wrap;
        }
        #count-area {
            display: none; 
        }
        #lap-display {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 0;
        }
        
        .count-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        h1 { 
            font-size: 5rem; 
            margin: 0; 
            font-weight: bold; 
        }
        .flower {
            font-size: 3.5rem;
            display: none; 
            animation: pop 0.5s ease;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .sub-text { 
            font-size: 1.6rem; 
            margin: 0 0 30px 0; 
            font-weight: bold; 
        }
        #qrcode-area {
            display: block;
        }
        #qrcode { 
            margin: 0 auto; 
            padding: 15px; 
            background: #fff; 
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 25px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, opacity 0.2s;
            width: 80%;
        }
        button:active {
            transform: scale(0.95);
        }
        #reset-btn {
            display: none;
            background-color: #212529;
            color: #fff;
        }
        #clear-btn {
            display: none;
            background-color: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>

<button id="system-reload-btn" onclick="systemRestart()">⚙️ 再起動</button>

<div class="box">
    <div id="welcome-message">QRコードを<br>スキャンしてください</div>

    <div id="count-area">
        <p id="lap-display">1周目</p>
        <div class="count-wrapper">
            <span class="flower">🌸</span>
            <h1 id="count-display">1回目</h1>
            <span class="flower">🌸</span>
        </div>
        <p class="sub-text">のご来店</p>
    </div>

    <div id="qrcode-area">
        <div id="qrcode"></div>
    </div>

    <div class="btn-group">
        <button id="reset-btn" onclick="resetToHome()">次の案内へ進む</button>
        <button id="clear-btn" onclick="triggerResetMode()">この人の回数をリセット</button>
    </div>
</div>

<script>
    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyDviyxxPk0ImXKBqClAwijH4jb_gYGR3rI",
        authDomain: "ozo1111.firebaseapp.com",
        databaseURL: "https://ozo1111-default-rtdb.firebaseio.com", 
        projectId: "ozo1111",
        storageBucket: "ozo1111.firebasestorage.app",
        messagingSenderId: "227549240271",
        appId: "1:227549240271:web:6c10dd8a11dac858b190ba"
    };

    firebase.initializeApp(firebaseConfig);
    let database = firebase.database();

    const currentUrl = window.location.href;
    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
    const normalUrl = baseUrl + '/card.html';
    const resetUrl = baseUrl + '/card.html?action=reset'; 

    const qrcodeContainer = document.getElementById("qrcode");
    let qrGenerator = new QRCode(qrcodeContainer, { text: normalUrl, width: 220, height: 220 });

    const STAGE_COLORS = [
        { bg: "#D1E7DD", text: "#0f5132" }, 
        { bg: "#CFF4FC", text: "#055160" }, 
        { bg: "#FFF3CD", text: "#664d03" }, 
        { bg: "#F8D7DA", text: "#842029" }, 
        { bg: "#E2D9F3", text: "#563d7c" }, 
        { bg: "#E0E0E0", text: "#333333" }, 
        { bg: "#FCE4D6", text: "#c65911" }, 
        { bg: "#E2EFDA", text: "#375623" }, 
        { bg: "#FFF2CC", text: "#7f6000" }, 
        { bg: "#D9E1F2", text: "#1f4e78" }  
    ];

    // 通信監視の開始関数
    function startListening() {
        database.ref('latest_scan').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.timestamp > (Date.now() - 5000)) { 
                let total = data.totalCount !== undefined ? data.totalCount : 1;
                let lap = data.lap !== undefined ? data.lap : 1;
                let current = data.currentCount !== undefined ? data.currentCount : 1;

                if (total === 0) {
                    showCountScreen(1, 1, 1);
                } else {
                    showCountScreen(total, lap, current);
                }
            }
        });
    }

    // 最初に監視を起動
    startListening();

    function showCountScreen(total, lap, current) {
        document.getElementById('welcome-message').style.display = 'none';
        document.getElementById('qrcode-area').style.display = 'none';

        document.getElementById('count-area').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('clear-btn').style.display = 'inline-block';
        document.getElementById('reset-btn').innerText = "次の案内へ進む";

        document.getElementById('lap-display').innerText = lap + "周目 (通算 " + total + " 回目)";
        document.getElementById('count-display').innerText = current + "回目";

        let colorIndex = (current - 1) % STAGE_COLORS.length;
        if(colorIndex < 0) colorIndex = 0;
        document.body.style.backgroundColor = STAGE_COLORS[colorIndex].bg;
        document.body.style.color = STAGE_COLORS[colorIndex].text;
        document.getElementById('lap-display').style.color = STAGE_COLORS[colorIndex].text;

        const flowers = document.querySelectorAll('.flower');
        if (lap >= 2) {
            document.body.classList.add('dot-pattern');
            flowers.forEach(el => el.style.display = 'inline-block');
        } else {
            document.body.classList.remove('dot-pattern');
            flowers.forEach(el => el.style.display = 'none');
        }
    }

    function resetToHome() {
        qrGenerator.clear();
        qrGenerator.makeCode(normalUrl);

        document.getElementById('welcome-message').innerText = "QRコードを\nスキャンしてください";
        document.getElementById('welcome-message').style.display = 'block';
        document.getElementById('qrcode-area').style.display = 'block';
        document.getElementById('count-area').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('clear-btn').style.display = 'none';

        document.body.classList.remove('dot-pattern');
        const flowers = document.querySelectorAll('.flower');
        flowers.forEach(el => el.style.display = 'none');

        document.body.style.backgroundColor = '#f8f9fa';
        document.body.style.color = '#212529';
    }

    function triggerResetMode() {
        qrGenerator.clear();
        qrGenerator.makeCode(resetUrl);

        document.getElementById('welcome-message').innerText = "【リセット用】\nもう一度スキャンさせてください";
        document.getElementById('welcome-message').style.display = 'block';
        document.getElementById('qrcode-area').style.display = 'block';
        
        document.getElementById('count-area').style.display = 'none';
        document.getElementById('clear-btn').style.display = 'none';
        document.getElementById('reset-btn').innerText = "キャンセルして戻る";
        document.getElementById('reset-btn').style.display = 'inline-block';

        document.body.classList.remove('dot-pattern');
        document.body.style.backgroundColor = '#fff3cd'; 
        document.body.style.color = '#664d03';
    }

    /* 【新機能】ワンタップシステム再起動処理 */
    function systemRestart() {
        // 1. ボタンのテキストを一瞬「再起動中...」にする
        const btn = document.getElementById('system-reload-btn');
        btn.innerText = "⏳ 再起動中...";
        btn.style.opacity = "1";

        try {
            // 2. Firebaseの通信を一度完全に切断して、ゴミデータをクリア
            database.ref('latest_scan').off();
            
            // 3. 画面の見た目を完全に初期待機状態に戻す
            resetToHome();

            // 4. 0.5秒後にFirebaseと再接続して監視をスタート
            setTimeout(() => {
                startListening();
                btn.innerText = "⚙️ 再起動";
                btn.style.opacity = "0.6";
            }, 500);

        } catch(e) {
            // 万が一の時は最終手段としてブラウザ丸ごと強制リロード
            window.location.reload();
        }
    }
</script>
</body>
</html>
